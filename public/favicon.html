<!--
  Favicon Generation Notes
  ========================
  Generate favicon.ico (binary) using one of these methods:

  1. Online tool: https://favicon.io/favicon-converter/
  2. CLI tool: npx favicons
  3. Manual: Convert a 32x32 PNG to ICO format

  Recommended sizes:
  - favicon.ico (16x16, 32x32 multi-size ICO)
  - apple-touch-icon.png (180x180)
  - icon-192.png (192x192 for Android)
  - icon-512.png (512x512 for PWA)

  Place generated files in public/ alongside this note.
-->
